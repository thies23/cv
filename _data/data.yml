      - ISO 27001 Certification
      
    
  - role: Senior Network & Infrastructure Engineer
    time: 2021 - 2024
    company: German Edge Cloud GmbH & Co. KG
    details: |
      - Responsible for Firewalling & Network Security
      - Responsible for our Infrastructure Management based on ansible
      - Maintaining the MPLS ring's betweens our datacenters
      - Consulting for other Teams in regards to questions about networking, (network) security & IPv6
      - Working as a technical expert during incidents as part of the companies incident response team as well as participating in the on-call schedule to satisfy our customers needs in highly reliable systems
      - Developing & maintaining specialised solutions based on customer needs. 
  
  - role: Self Employed
    time: 2020 - present
    company: Thies Mueller Service Solutions
    details: |
      - Supporting the IT needs for small & medium NGOs
      - Creating specialised tools
      - Consulting on network and network security needs
      - Planning and operating event networks & infrastructure
    

  - role: Network Engineer
    time: 2019 - 2021
    company: WOBCOM GmbH, Wolfsburg
    details: |
      - Performing troubleshooting for Juniper-, Cisco-, and Fortinet Appliances to ensure a reliable network for our customers
      - Managing Firewalls and VPN Systems, keeping up the high security demands for our customers, as well as our internal systems
      - Working as a technical expert during incidents as part of the companies incident response team as well as participating in the on-call schedule to satisfy our customers needs in highly reliable systems
      - Managed the web servers, hosting company owned and customer websites with Plesk, nginx and apache2
  - role: System & Network Administration
    time: 2017 - 2018
    company: Volke Kommunikations-Design GmbH, Wolfsburg
    details: |
      - Deployed and managed the corporates antivirus and security solution, including the whole corporates technical systems, resulting in an increased overall security for the company
      - Designed, planned, deployed, and leading the implementation project of the new company network infrastructure, incorporating Juniper products, including routers, switches, and firewalls, consolidating a highly heterogeneous network into a much easier to manage setup, resulting in a increased system reliability and security
      - Management of the servers, vmhosts, and virtual machines for the hosting of the web applications provided to customers, as well as internal services using state of the art technology like nginx
  - role: Trainee "Fachinformatiker Systemintegration"
    time: 2014 - 2017
    company: Volke Kommunikations-Design GmbH, Wolfsburg
    details: |
      - Learned about security services by working in multiple implementation projects for security services, like fortigate and sophos firewalls
      - Learned about network and server side automation to automatically deploy new and maintain existing applications inside the company as well as customer applications
      - Deployed a new asset management solution to effectively keeping track of the companies assets across the workplaces and inside the datacenter
      - Managed the Windows 7 environment inside the company
      - Worked in the IT-HelpDesk for the internal staff to ensure smooth day-to-day operations of the company
